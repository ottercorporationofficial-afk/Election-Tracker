<!-- ================= CivicAPI Auto Resize ================= -->

<script>
(function () {

    const iframe = document.getElementById("civicapi-embed2-84287");

    if (!iframe) return;

    function onMessage(event) {

        const data = event.data;

        if (!data) return;
        if (data.source !== "civicapi-embed2") return;
        if (data.type !== "resize") return;
        if (data.frameId !== "civicapi-embed2-84287") return;
        if (typeof data.height !== "number") return;

        // Cap the height so the map doesn't dominate the page
        iframe.style.height = Math.min(750, Math.ceil(data.height)) + "px";

    }

    window.addEventListener("message", onMessage);

})();
</script>

<script src="/static/app.js?v=5"></script>
