<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Colorado Election Tracker</title>

    <link rel="stylesheet" href="/static/css/style.css?v=5">
</head>


<header>

    <div class="header-left">

        <h1>Colorado Republican Primary</h1>

        <p id="last-updated">

            Last Updated: --

        </p>

    </div>

    <div class="live-indicator">

        LIVE

    </div>

</header>

<!-- ===================== Statewide ===================== -->

<section class="overview">

    <!-- Left -->

    <div class="statewide-panel">

        <h2>Statewide Results</h2>

            <div id="statewide">

                <div class="statewide-candidate">

                    <div class="statewide-header">

                        <span class="candidate-color marx"></span>

                        <span class="statewide-name">
                            Victor Marx
                        </span>

                    </div>

                    <div class="statewide-votes">
                        356,123 votes
                    </div>

                    <div class="statewide-percent">
                        42.8%
                    </div>

                    <div class="progress">
                        <div class="progress-fill marx-fill" style="width:42.8%"></div>
                    </div>

                </div>

                <div class="statewide-candidate">

                    <div class="statewide-header">

                        <span class="candidate-color kirkmeyer"></span>

                        <span class="statewide-name">
                            Barb Kirkmeyer
                        </span>

                    </div>

                    <div class="statewide-votes">
                        298,540 votes
                    </div>

                    <div class="statewide-percent">
                        35.8%
                    </div>

                    <div class="progress">
                        <div class="progress-fill kirkmeyer-fill" style="width:35.8%"></div>
                    </div>

                </div>

                <div class="statewide-candidate">

                    <div class="statewide-header">

                        <span class="candidate-color bottoms"></span>

                        <span class="statewide-name">
                            Scott Bottoms
                        </span>

                    </div>

                    <div class="statewide-votes">
                        180,012 votes
                    </div>

                    <div class="statewide-percent">
                        21.4%
                    </div>

                    <div class="progress">
                        <div class="progress-fill bottoms-fill" style="width:21.4%"></div>
                    </div>

                </div>

                <hr>

                <div class="reporting-box">

                    <strong>Reporting</strong>

                    <span>98%</span>

                </div>

</div>

    </div>

    <!-- Right -->

    <div class="map-panel">

        <h2>County Map</h2>

        <div id="map">

        </div>

    </div>

</section>

<!-- ===================== Feed ===================== -->

<section class="feed-section">

    <h2>Live County Feed</h2>

    <div id="history"></div>

</section>

<script src="https://d3js.org/d3.v7.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/topojson-client@3"></script>

<script src="/static/js/map.js"></script>
<link rel="stylesheet" href="/static/css/style.css">


<script src="/static/js/app.js?v=5"></script>

</body>

</html>
