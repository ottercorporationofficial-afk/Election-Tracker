<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Colorado Election Tracker</title>

    <link rel="icon" type="image/png" href="static/images/otter-icon.png">

    <link rel="stylesheet" href="/static/css/style.css?v=6">
</head>

<body>

<div class="top-header">
    <div class="top-header-content">
        <div class="site-name">Otter Elections</div>

        <div class="top-nav">
            Results
        </div>
    </div>
</div>

<div class="container">
    <header class="page-header">
        <div class="header-left">
            <h1>Colorado Republican Primary</h1>

            <div class="header-meta">
                <span id="last-updated"></span>
                <span class="separator">•</span>
                <span id="header-reporting">98% reporting</span>
            </div>
        </div>

        <div class="live-indicator">
            LIVE
        </div>
    </header>
</div>

<!-- ===================== Statewide ===================== -->

<section class="overview">

    <!-- Left -->

    <div class="statewide-panel">

        <h2>Statewide Results</h2>

        <div id="statewide"></div>

    </div>

    <!-- Right -->

    <div class="map-panel">

        <h2>County Map</h2>

        <div id="map">

        </div>

    </div>

</section>

<!-- ===================== Feed ===================== -->

<section class="feed-section">

    <h2>Live County Feed</h2>

    <div id="history"></div>

</section>

<script src="https://d3js.org/d3.v7.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/topojson-client@3"></script>

<script src="static/js/map.js"></script>
<script src="static/js/app.js?v=6"></script>

</body>

</html>
