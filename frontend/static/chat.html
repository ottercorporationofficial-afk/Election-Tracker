<div id="chat">

    <div id="chat-sidebar">
        <button id="new-chat-btn" onclick="startNewChat()">+ New chat</button>
        <div id="conversation-list"></div>
    </div>

    <div id="chat-main">

        <div id="messages"></div>

        <div class="chat-input-bar">
            <input
                id="message"
                placeholder="Ask Otter AI..."
            >
            <button onclick="sendMessage()">
                Send
            </button>
        </div>

    </div>

</div>
